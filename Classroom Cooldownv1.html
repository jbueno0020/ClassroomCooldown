<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settle In — Classroom Cooldown</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1b2a;
    --deep: #091526;
    --teal: #3ecfb2;
    --teal-dim: rgba(62,207,178,0.12);
    --teal-glow: rgba(62,207,178,0.35);
    --gold: #e8c97e;
    --text: #d4e8e0;
    --muted: rgba(212,232,224,0.45);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── Background canvas ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ── Layout ── */
  .shell {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 0;
  }

  /* ── Header ── */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    z-index: 10;
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .session-timer {
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    transition: color 0.4s;
  }
  .session-timer.urgent { color: var(--gold); }

  /* ── Progress bar ── */
  .progress-bar-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.06);
    z-index: 11;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--gold));
    transition: width 1s linear;
    box-shadow: 0 0 8px var(--teal-glow);
  }

  /* ── Phase label ── */
  .phase-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.85rem, 1.5vw, 1rem);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 18px;
    opacity: 0.85;
    min-height: 1.4em;
    transition: opacity 0.5s;
  }

  /* ── Orb ── */
  .orb-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: clamp(220px, 32vmin, 340px);
    height: clamp(220px, 32vmin, 340px);
    margin: 0;
  }

  .orb-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--teal-glow);
    animation: pulse-ring 4s ease-in-out infinite;
  }
  .orb-ring:nth-child(1) { width: 110%; height: 110%; animation-delay: 0s; }
  .orb-ring:nth-child(2) { width: 125%; height: 125%; animation-delay: 0.8s; opacity: 0.5; }
  .orb-ring:nth-child(3) { width: 142%; height: 142%; animation-delay: 1.6s; opacity: 0.25; }

  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.04); opacity: 0.2; }
  }

  .orb {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 36%, rgba(62,207,178,0.22) 0%, rgba(13,27,42,0.9) 65%);
    border: 1.5px solid rgba(62,207,178,0.4);
    box-shadow:
      0 0 40px rgba(62,207,178,0.18),
      inset 0 0 60px rgba(62,207,178,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
  }

  /* Orb inner content wrapper */
  .orb-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s;
  }
  .orb.paused .orb-content {
    opacity: 0.12;
  }

  /* Pause overlay inside orb */
  .orb-pause-overlay {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
    border-radius: 50%;
  }
  .orb-pause-overlay.show { display: flex; }
  .pause-icon {
    font-size: clamp(2rem, 5vmin, 3.2rem);
    color: var(--teal);
    opacity: 0.75;
    line-height: 1;
  }
  .pause-label {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(0.6rem, 1.2vmin, 0.72rem);
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .orb-count {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 7vmin, 5rem);
    font-weight: 300;
    line-height: 1;
    color: var(--teal);
    text-shadow: 0 0 30px var(--teal-glow);
    font-variant-numeric: tabular-nums;
    transition: color 0.4s;
  }
  .orb-count.hold { color: var(--gold); text-shadow: 0 0 30px rgba(232,201,126,0.4); }

  .orb-word {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(0.65rem, 1.2vmin, 0.8rem);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ── Breath instruction ── */
  .breath-text {
    margin-top: 22px;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.3rem, 3vmin, 2rem);
    font-weight: 300;
    font-style: italic;
    color: var(--text);
    letter-spacing: 0.04em;
    text-align: center;
    min-height: 2.4rem;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.6s, transform 0.6s;
  }
  .breath-text.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Cycle counter ── */
  .cycle-counter {
    font-size: 0.65rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(62,207,178,0.4);
    margin-top: 8px;
    min-height: 1em;
    transition: opacity 0.5s;
  }

  /* ── Grounding prompts ── */
  .grounding-wrap {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
    max-width: 600px;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .grounding-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 2.4vmin, 1.35rem);
    font-weight: 300;
    font-style: italic;
    color: rgba(212,232,224,0.6);
    letter-spacing: 0.03em;
    transition: opacity 0.8s;
    min-height: 2em;
    line-height: 1.55;
  }
  .grounding-next {
    background: transparent;
    border: 1px solid rgba(62,207,178,0.2);
    color: rgba(62,207,178,0.45);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.63rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .grounding-next:hover {
    border-color: rgba(62,207,178,0.5);
    color: var(--teal);
  }
  .grounding-next.show { display: block; }

  /* ── Controls ── */
  .controls {
    position: fixed;
    bottom: 80px;
    right: 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 20;
  }

  .ctrl-btn {
    background: rgba(62,207,178,0.08);
    border: 1px solid rgba(62,207,178,0.25);
    color: var(--teal);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 9px 18px;
    border-radius: 40px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .ctrl-btn:hover {
    background: rgba(62,207,178,0.16);
    border-color: rgba(62,207,178,0.5);
  }
  .ctrl-btn.active {
    background: rgba(62,207,178,0.2);
    border-color: var(--teal);
    color: #fff;
  }

  /* ── Duration picker ── */
  .duration-picker {
    position: fixed;
    bottom: 80px;
    left: 28px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 20;
  }
  .dur-label {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .dur-btn {
    background: transparent;
    border: 1px solid rgba(212,232,224,0.15);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    padding: 7px 14px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .dur-btn:hover { border-color: var(--teal-glow); color: var(--teal); }
  .dur-btn.active { border-color: var(--teal); color: var(--teal); background: rgba(62,207,178,0.08); }

  /* ── Bottom actions: Pause + Sound ── */
  .bottom-actions {
    position: fixed;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 20;
  }
  .action-btn {
    background: rgba(9,21,38,0.6);
    border: 1px solid rgba(212,232,224,0.14);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 8px 22px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.25s;
    backdrop-filter: blur(8px);
  }
  .action-btn:hover {
    border-color: rgba(62,207,178,0.4);
    color: var(--teal);
  }
  .action-btn.active {
    border-color: var(--teal);
    color: var(--teal);
    background: rgba(62,207,178,0.1);
  }

  /* ── Done screen ── */
  .done-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--deep);
    z-index: 50;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    text-align: center;
    padding: 40px;
  }
  .done-screen.show { display: flex; }
  .done-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 300;
    color: var(--teal);
    text-shadow: 0 0 50px var(--teal-glow);
    animation: fadeUp 1s ease forwards;
  }
  .done-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    font-weight: 300;
    font-style: italic;
    color: var(--muted);
    animation: fadeUp 1s 0.3s ease both;
  }
  .done-stat {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(62,207,178,0.45);
    animation: fadeUp 1s 0.5s ease both;
  }
  .done-restart {
    margin-top: 24px;
    background: transparent;
    border: 1px solid var(--teal);
    color: var(--teal);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 12px 32px;
    border-radius: 40px;
    cursor: pointer;
    transition: background 0.2s;
    animation: fadeUp 1s 0.6s ease both;
  }
  .done-restart:hover { background: rgba(62,207,178,0.12); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressBar" style="width:100%"></div>
</div>

<div class="header">
  <span class="brand">Settle In</span>
  <span class="session-timer" id="sessionTimer">5:00</span>
</div>

<div class="shell">
  <div class="phase-label" id="phaseLabel">Breathe</div>

  <div class="orb-container">
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb" id="orb">
      <div class="orb-content" id="orbContent">
        <div class="orb-count" id="orbCount">4</div>
        <div class="orb-word" id="orbWord">inhale</div>
      </div>
      <div class="orb-pause-overlay" id="orbPause">
        <div class="pause-icon">&#9646;&#9646;</div>
        <div class="pause-label">Paused</div>
      </div>
    </div>
  </div>

  <div class="breath-text visible" id="breathText">Close your eyes. Follow the orb.</div>
  <div class="cycle-counter" id="cycleCounter"></div>
</div>

<div class="grounding-wrap">
  <div class="grounding-text" id="groundingText"></div>
  <button class="grounding-next" id="groundingNext" onclick="nextPrompt()">Next prompt ›</button>
</div>

<!-- Mode Controls -->
<div class="controls">
  <button class="ctrl-btn active" id="btnBreath" onclick="setMode('breath')">Breathing</button>
  <button class="ctrl-btn" id="btnGround" onclick="setMode('ground')">Grounding</button>
  <button class="ctrl-btn" id="btnFocus" onclick="setMode('focus')">Focus</button>
</div>

<!-- Duration Picker -->
<div class="duration-picker">
  <div class="dur-label">Duration</div>
  <button class="dur-btn" onclick="setDuration(3, this)">3 min</button>
  <button class="dur-btn active" onclick="setDuration(5, this)">5 min</button>
  <button class="dur-btn" onclick="setDuration(7, this)">7 min</button>
  <button class="dur-btn" onclick="setDuration(10, this)">10 min</button>
</div>

<!-- Bottom actions -->
<div class="bottom-actions">
  <button class="action-btn" id="btnPause" onclick="togglePause()">Pause</button>
  <button class="action-btn" id="btnSound" onclick="toggleSound()">Sound Off</button>
</div>

<!-- Done screen -->
<div class="done-screen" id="doneScreen">
  <div class="done-title">You&#8217;re Ready.</div>
  <div class="done-sub">Your mind is settled. Your body is calm.<br>Let&#8217;s have a great afternoon.</div>
  <div class="done-stat" id="doneStat"></div>
  <button class="done-restart" onclick="restart()">Go Again</button>
</div>

<script>
// ── Canvas background: floating particles ──────────────────────────
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resizeCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function mkParticle() {
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.8 + 0.4,
    vx: (Math.random() - 0.5) * 0.18,
    vy: -Math.random() * 0.22 - 0.06,
    alpha: Math.random() * 0.35 + 0.08
  };
}
for (let i = 0; i < 90; i++) particles.push(mkParticle());

function drawBg() {
  ctx.clearRect(0, 0, W, H);
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
  grad.addColorStop(0, 'rgba(20,50,60,0.9)');
  grad.addColorStop(1, 'rgba(9,21,38,1)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  const glow = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.min(W, H) * 0.38);
  glow.addColorStop(0, 'rgba(62,207,178,0.055)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(62,207,178,' + p.alpha + ')';
    ctx.fill();
    p.x += p.vx;
    p.y += p.vy;
    if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
    if (p.x < -4) p.x = W + 4;
    if (p.x > W + 4) p.x = -4;
  });

  requestAnimationFrame(drawBg);
}
drawBg();

// ── State ──────────────────────────────────────────────────────────
let totalSeconds = 5 * 60;
let remaining = totalSeconds;
let sessionInterval = null;
let mode = 'breath';
let isPaused = false;
let breathCycles = 0;
let currentPromptList = null;
let currentPromptIdx = 0;

// Breathing pattern: inhale 4, hold 4, exhale 6, rest 2
const PHASES = [
  { name: 'Inhale', duration: 4, word: 'inhale', scale: 1.18, label: 'Breathe',  textClass: '' },
  { name: 'Hold',   duration: 4, word: 'hold',   scale: 1.18, label: 'Hold',     textClass: 'hold' },
  { name: 'Exhale', duration: 6, word: 'exhale', scale: 0.88, label: 'Release',  textClass: '' },
  { name: 'Rest',   duration: 2, word: 'rest',   scale: 0.88, label: 'Rest',     textClass: '' },
];

let phaseIdx = 0;
let phaseCount = 0;
let phaseInterval = null;
let groundInterval = null;
let groundIdx = 0;

const GROUNDING = [
  'Notice 5 things you can see around you.',
  'Feel your feet flat on the floor.',
  'Take a slow breath in through your nose.',
  'Relax your shoulders away from your ears.',
  'Notice 4 things you can physically feel.',
  'Let your jaw unclench. Soften your face.',
  'Think of one word that describes how you want to feel this afternoon.',
  'Notice 3 sounds you can hear right now.',
  'Rest your hands in your lap. Feel their weight.',
  'Picture somewhere that makes you feel calm.',
];

const FOCUS_PROMPTS = [
  'What is one goal you have for this afternoon?',
  'Think of one person who believes in you.',
  'What is one thing you\'re proud of from today?',
  'What does a good afternoon look like for you?',
  'Choose one word as your intention for the rest of the day.',
];

// ── Session timer ──────────────────────────────────────────────────
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + String(sec).padStart(2, '0');
}

function startSession() {
  remaining = totalSeconds;
  breathCycles = 0;
  updateTimerDisplay();
  document.getElementById('progressBar').style.width = '100%';
  clearInterval(sessionInterval);
  sessionInterval = setInterval(tickSession, 1000);
}

function startSessionFromRemaining() {
  clearInterval(sessionInterval);
  sessionInterval = setInterval(tickSession, 1000);
}

function tickSession() {
  remaining--;
  updateTimerDisplay();
  const pct = (remaining / totalSeconds) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  if (remaining <= 30) document.getElementById('sessionTimer').classList.add('urgent');
  if (remaining <= 0) endSession();
}

function updateTimerDisplay() {
  document.getElementById('sessionTimer').textContent = formatTime(remaining);
}

function endSession() {
  clearAll();
  const mins = Math.floor(totalSeconds / 60);
  const cycleText = breathCycles > 0
    ? mins + ' min session \u00b7 ' + breathCycles + ' breathing cycle' + (breathCycles !== 1 ? 's' : '')
    : mins + ' min session complete';
  document.getElementById('doneStat').textContent = cycleText;
  document.getElementById('doneScreen').classList.add('show');
}

function restart() {
  document.getElementById('doneScreen').classList.remove('show');
  document.getElementById('sessionTimer').classList.remove('urgent');
  isPaused = false;
  document.getElementById('btnPause').textContent = 'Pause';
  document.getElementById('btnPause').classList.remove('active');
  document.getElementById('orb').classList.remove('paused');
  document.getElementById('orbPause').classList.remove('show');
  clearBreath();
  groundIdx = 0;
  startSession();
  setMode(mode);
}

// ── Breathing mode ─────────────────────────────────────────────────
function startBreathing() {
  runPhase();
}

function runPhase() {
  clearInterval(phaseInterval); // guard: never spawn duplicate intervals
  const ph = PHASES[phaseIdx];
  phaseCount = ph.duration;
  updateOrb(ph, phaseCount);
  setOrbScale(ph.scale, ph.duration);

  // Track completed cycles (count at start of each inhale)
  if (phaseIdx === 0) {
    breathCycles++;
    if (breathCycles > 1) {
      document.getElementById('cycleCounter').textContent = 'Cycle ' + breathCycles;
    }
  }

  phaseInterval = setInterval(function() {
    phaseCount--;
    if (phaseCount <= 0) {
      clearInterval(phaseInterval);
      phaseIdx = (phaseIdx + 1) % PHASES.length;
      runPhase();
    } else {
      document.getElementById('orbCount').textContent = phaseCount;
    }
  }, 1000);
}

function resumeBreathing() {
  clearInterval(phaseInterval); // safety
  const ph = PHASES[phaseIdx];
  // Restore orb display without resetting phaseCount
  document.getElementById('orbCount').textContent = phaseCount > 0 ? phaseCount : ph.duration;
  document.getElementById('orbCount').className = 'orb-count ' + (ph.textClass || '');
  document.getElementById('orbWord').textContent = ph.word;
  document.getElementById('phaseLabel').textContent = ph.label;

  phaseInterval = setInterval(function() {
    phaseCount--;
    if (phaseCount <= 0) {
      clearInterval(phaseInterval);
      phaseIdx = (phaseIdx + 1) % PHASES.length;
      runPhase();
    } else {
      document.getElementById('orbCount').textContent = phaseCount;
    }
  }, 1000);
}

function updateOrb(ph, count) {
  document.getElementById('orbCount').textContent = count;
  document.getElementById('orbCount').className = 'orb-count ' + (ph.textClass || '');
  document.getElementById('orbWord').textContent = ph.word;
  document.getElementById('phaseLabel').textContent = ph.label;
}

function setOrbScale(scale, duration) {
  const orb = document.getElementById('orb');
  orb.style.transition = 'transform ' + duration + 's ease-in-out';
  orb.style.transform = 'scale(' + scale + ')';
}

// ── Grounding mode ─────────────────────────────────────────────────
function startGrounding() {
  document.getElementById('phaseLabel').textContent = 'Grounding';
  document.getElementById('orbCount').textContent = '\u2736';
  document.getElementById('orbCount').className = 'orb-count';
  document.getElementById('orbWord').textContent = 'notice';
  document.getElementById('orb').style.transform = 'scale(1)';
  document.getElementById('orb').style.transition = 'transform 3s ease-in-out';
  document.getElementById('cycleCounter').textContent = '';
  currentPromptList = GROUNDING;
  currentPromptIdx = groundIdx;
  showGrounding(GROUNDING[groundIdx]);
  document.getElementById('groundingNext').classList.add('show');
  clearInterval(groundInterval);
  groundInterval = setInterval(function() {
    groundIdx = (groundIdx + 1) % GROUNDING.length;
    currentPromptIdx = groundIdx;
    showGrounding(GROUNDING[groundIdx]);
  }, 8000);
}

// ── Focus mode ─────────────────────────────────────────────────────
function startFocus() {
  document.getElementById('phaseLabel').textContent = 'Reflect';
  document.getElementById('orbCount').textContent = '\u25c8';
  document.getElementById('orbCount').className = 'orb-count';
  document.getElementById('orbWord').textContent = 'reflect';
  document.getElementById('orb').style.transform = 'scale(1.05)';
  document.getElementById('orb').style.transition = 'transform 4s ease-in-out';
  document.getElementById('cycleCounter').textContent = '';
  currentPromptList = FOCUS_PROMPTS;
  currentPromptIdx = 0;
  showGrounding(FOCUS_PROMPTS[0]);
  document.getElementById('groundingNext').classList.add('show');
  clearInterval(groundInterval);
  groundInterval = setInterval(function() {
    currentPromptIdx = (currentPromptIdx + 1) % FOCUS_PROMPTS.length;
    showGrounding(FOCUS_PROMPTS[currentPromptIdx]);
  }, 9000);
}

function showGrounding(text) {
  var el = document.getElementById('groundingText');
  el.style.opacity = '0';
  setTimeout(function() {
    el.textContent = text;
    el.style.opacity = '1';
  }, 500);
}

function nextPrompt() {
  if (!currentPromptList) return;
  clearInterval(groundInterval);
  currentPromptIdx = (currentPromptIdx + 1) % currentPromptList.length;
  if (mode === 'ground') groundIdx = currentPromptIdx;
  showGrounding(currentPromptList[currentPromptIdx]);
  // Restart the auto-advance timer
  var interval = mode === 'ground' ? 8000 : 9000;
  groundInterval = setInterval(function() {
    currentPromptIdx = (currentPromptIdx + 1) % currentPromptList.length;
    if (mode === 'ground') groundIdx = currentPromptIdx;
    showGrounding(currentPromptList[currentPromptIdx]);
  }, interval);
}

// ── Mode switcher ──────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  clearBreath();

  document.querySelectorAll('.ctrl-btn').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('btn' + m.charAt(0).toUpperCase() + m.slice(1));
  if (btn) btn.classList.add('active');

  document.getElementById('groundingText').textContent = '';
  document.getElementById('groundingNext').classList.remove('show');
  document.getElementById('cycleCounter').textContent = '';

  var bt = document.getElementById('breathText');

  if (m === 'breath') {
    bt.textContent = 'Follow the orb. Breathe slowly.';
    bt.classList.add('visible');
    startBreathing();
  } else if (m === 'ground') {
    bt.textContent = 'Read each prompt. Pause and notice.';
    bt.classList.add('visible');
    startGrounding();
  } else if (m === 'focus') {
    bt.textContent = 'Sit with the question. There\u2019s no wrong answer.';
    bt.classList.add('visible');
    startFocus();
  }
}

function clearBreath() {
  clearInterval(phaseInterval);
  clearInterval(groundInterval);
  phaseInterval = null;
  groundInterval = null;
  phaseIdx = 0;
  phaseCount = 0;
  breathCycles = 0;
  currentPromptList = null;
}

function clearAll() {
  clearBreath();
  clearInterval(sessionInterval);
  sessionInterval = null;
}

// ── Pause / Resume ─────────────────────────────────────────────────
function togglePause() {
  if (isPaused) {
    resumeSession();
  } else {
    pauseSession();
  }
}

function pauseSession() {
  isPaused = true;
  clearInterval(sessionInterval);
  clearInterval(phaseInterval);
  clearInterval(groundInterval);
  // Smooth the orb to rest
  var orb = document.getElementById('orb');
  orb.style.transition = 'transform 0.8s ease-in-out';
  orb.classList.add('paused');
  document.getElementById('orbPause').classList.add('show');
  document.getElementById('btnPause').textContent = 'Resume';
  document.getElementById('btnPause').classList.add('active');
}

function resumeSession() {
  isPaused = false;
  var orb = document.getElementById('orb');
  orb.classList.remove('paused');
  document.getElementById('orbPause').classList.remove('show');
  document.getElementById('btnPause').textContent = 'Pause';
  document.getElementById('btnPause').classList.remove('active');

  // Resume session timer
  startSessionFromRemaining();

  // Resume mode-specific content
  if (mode === 'breath') {
    resumeBreathing();
  } else if (mode === 'ground') {
    showGrounding(currentPromptList ? currentPromptList[currentPromptIdx] : GROUNDING[groundIdx]);
    clearInterval(groundInterval);
    groundInterval = setInterval(function() {
      groundIdx = (groundIdx + 1) % GROUNDING.length;
      currentPromptIdx = groundIdx;
      showGrounding(GROUNDING[groundIdx]);
    }, 8000);
  } else if (mode === 'focus') {
    var list = currentPromptList || FOCUS_PROMPTS;
    showGrounding(list[currentPromptIdx]);
    clearInterval(groundInterval);
    groundInterval = setInterval(function() {
      currentPromptIdx = (currentPromptIdx + 1) % FOCUS_PROMPTS.length;
      showGrounding(FOCUS_PROMPTS[currentPromptIdx]);
    }, 9000);
  }
}

// ── Duration setter ────────────────────────────────────────────────
function setDuration(mins, btn) {
  document.querySelectorAll('.dur-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  totalSeconds = mins * 60;
  isPaused = false;
  document.getElementById('btnPause').textContent = 'Pause';
  document.getElementById('btnPause').classList.remove('active');
  document.getElementById('orb').classList.remove('paused');
  document.getElementById('orbPause').classList.remove('show');
  document.getElementById('sessionTimer').classList.remove('urgent');
  clearAll();
  groundIdx = 0;
  startSession();
  setMode(mode);
}

// ── Ambient sound (Web Audio API) ──────────────────────────────────
var audioCtx = null;
var ambientNodes = [];
var soundEnabled = false;

function toggleSound() {
  if (!soundEnabled) {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    // Resume context if suspended (browser autoplay policy)
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    startAmbient();
    soundEnabled = true;
    document.getElementById('btnSound').textContent = 'Sound On';
    document.getElementById('btnSound').classList.add('active');
  } else {
    stopAmbient();
    soundEnabled = false;
    document.getElementById('btnSound').textContent = 'Sound Off';
    document.getElementById('btnSound').classList.remove('active');
  }
}

function startAmbient() {
  if (!audioCtx) return;

  // Gentle filtered white noise (soft rainfall / distant ocean)
  var bufferSize = audioCtx.sampleRate * 4;
  var noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  var data = noiseBuffer.getChannelData(0);
  for (var i = 0; i < bufferSize; i++) {
    data[i] = Math.random() * 2 - 1;
  }
  var noiseSource = audioCtx.createBufferSource();
  noiseSource.buffer = noiseBuffer;
  noiseSource.loop = true;

  var lowpass = audioCtx.createBiquadFilter();
  lowpass.type = 'lowpass';
  lowpass.frequency.value = 320;
  lowpass.Q.value = 0.4;

  var noiseGain = audioCtx.createGain();
  noiseGain.gain.value = 0.065;

  noiseSource.connect(lowpass);
  lowpass.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);
  noiseSource.start();

  // Low root drone (A1 = 55 Hz)
  var drone = audioCtx.createOscillator();
  drone.type = 'sine';
  drone.frequency.value = 55;
  var droneGain = audioCtx.createGain();
  droneGain.gain.value = 0.032;
  drone.connect(droneGain);
  droneGain.connect(audioCtx.destination);
  drone.start();

  // Perfect fifth harmonic (E2 = 82.5 Hz)
  var fifth = audioCtx.createOscillator();
  fifth.type = 'sine';
  fifth.frequency.value = 82.5;
  var fifthGain = audioCtx.createGain();
  fifthGain.gain.value = 0.016;
  fifth.connect(fifthGain);
  fifthGain.connect(audioCtx.destination);
  fifth.start();

  ambientNodes = [noiseSource, drone, fifth, lowpass, noiseGain, droneGain, fifthGain];
}

function stopAmbient() {
  ambientNodes.forEach(function(n) {
    try {
      if (n.stop) n.stop();
      n.disconnect();
    } catch(e) {}
  });
  ambientNodes = [];
}

// ── Keyboard shortcuts ─────────────────────────────────────────────
// Space = pause/resume  |  N = next prompt  |  S = toggle sound
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'BUTTON') return; // don't intercept button clicks
  if (e.code === 'Space') {
    e.preventDefault();
    togglePause();
  } else if (e.code === 'KeyN') {
    if (mode !== 'breath') nextPrompt();
  } else if (e.code === 'KeyS') {
    toggleSound();
  }
});

// ── Init ───────────────────────────────────────────────────────────
startSession();
setMode('breath');
</script>
